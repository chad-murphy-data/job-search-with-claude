name: Job Search Digest

on:
  schedule:
    # Tue / Fri at 13:00 UTC ≈ 9am EST. Adjust as you like.
    - cron: '0 13 * * 2,5'
  workflow_dispatch:  # lets you trigger manually from the Actions tab

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for the auto-commit step

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python job_search.py

      - name: Commit updated sent_jobs.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update sent_jobs.json'
          file_pattern: 'sent_jobs.json'
